name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ sqlite3 libsqlite3-dev

      - name: Run regression
        run: |
          chmod +x scripts/test_regression.sh
          chmod +x tools/benchmark/bench_license_flow.sh
          ./scripts/test_regression.sh
